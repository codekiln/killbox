#:schema https://mise.en.dev/schema/mise.json
min_version = "2026.5.3"

[settings]
lockfile = true
minimum_release_age = "5d"
npm.package_manager = "auto"

[tools]
aube = "latest"
node = "24"
"npm:@fission-ai/openspec" = "latest"

[tasks.install]
description = "Install Astro platform and Phaser prototype dependencies"
run = "aube install --prefer-frozen-lockfile"

[tasks.dev]
description = "Run the Astro development server"
run = "aube run dev"

[tasks.build]
description = "Build the static Astro game platform"
run = "aube run build"

[tasks.preview]
description = "Preview the production build locally"
run = "aube run preview"

[tasks.lint]
description = "Run TypeScript static checks"
run = "aube run lint"

[tasks.test]
description = "Run unit tests"
run = "aube run test"

[tasks."test:e2e"]
description = "Run Playwright browser tests"
run = "aube run build && aube exec playwright test"

[tasks."test:e2e:local"]
description = "Build and verify the production preview with Playwright"
run = "aube run build && aube exec playwright test"

[tasks."test:e2e:public"]
description = "Verify a published Pages deployment with Playwright"
run = "aube run test:e2e:public"

[tasks.openspec]
description = "Run the OpenSpec CLI"
run = "openspec"

[tasks."openspec:check"]
description = "Check OpenSpec project state"
run = "openspec validate --all --strict --no-interactive"

[tasks."openspec:help"]
description = "Show OpenSpec CLI help"
run = "openspec --help"

[tasks."spec-check"]
description = "Validate OpenSpec changes and specs"
run = "aube run spec-check"

[tasks.status]
description = "Show repository status"
run = "git status --short --branch"

[tasks.check]
description = "Run lint, tests, build, browser smoke checks, and OpenSpec validation"
run = "aube run lint && aube run test && aube run build && aube run test:e2e:public && aube run spec-check"
