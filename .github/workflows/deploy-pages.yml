name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deployment_version: ${{ steps.version.outputs.deployment_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute deployment version
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          package_version="$(node -p "require('./package.json').version")"
          deployment_version="${package_version}+${short_sha}"
          echo "deployment_version=${deployment_version}" >> "$GITHUB_OUTPUT"
          echo "Deployment version: ${deployment_version}"

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_KILLBOX_DEPLOY_VERSION: ${{ steps.version.outputs.deployment_version }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify public Pages deployment
        run: npm run test:e2e:public
        env:
          KILLBOX_PUBLIC_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          KILLBOX_EXPECTED_VERSION: ${{ needs.build.outputs.deployment_version }}
          KILLBOX_DEPLOYMENT_WAIT_MS: "180000"
